name: Build and Release

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller gevent-websocket
    - name: Build EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --noconsole `
          --name="Server-Monitor" `
          --icon="favicon-64x64.ico" `
          --add-data "favicon.ico;." `
          --add-data "static;static" `
          --add-data "templates;templates" `
          --add-data "monitor_core;monitor_core" `
          --version-file="file_version_info.txt" `
          --hidden-import=gevent `
          --hidden-import=engineio.async_drivers.gevent `
          --hidden-import=geventwebsocket.gws `
          "server_monitor.py"
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: Windows-Build
        path: dist/Server-Monitor.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller gevent-websocket
    - name: Build Linux Binary
      run: |
        pyinstaller --noconfirm --onefile --name="Server-Monitor" \
          --add-data "favicon.ico:." \
          --add-data "static:static" \
          --add-data "templates:templates" \
          --add-data "monitor_core:monitor_core" \
          --hidden-import=gevent \
          --hidden-import=engineio.async_drivers.gevent \
          --hidden-import=geventwebsocket.gws \
          "server_monitor.py"
    - name: Create .deb Package
      run: |
        mkdir -p package/usr/local/bin
        cp dist/Server-Monitor package/usr/local/bin/ 
        mkdir -p package/DEBIAN
        echo "Package: server-monitor
        Version: 1.0.0
        Architecture: amd64
        Maintainer: github-actions
        Description: Server Monitor Website" > package/DEBIAN/control
        dpkg-deb --build package Server-Monitor.deb
    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: Linux-Build
        path: Server-Monitor.deb

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build APK with Buildozer
        uses: kivy/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: master
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Android-Build
          path: bin/*.apk

  publish-release:
    permissions: write-all
    needs: [build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/Windows-Build/Server-Monitor.exe,./artifacts/Linux-Build/Server-Monitor.deb,./artifacts/Android-Build/*.apk"
          tag: "latest"
          name: "Latest Continuous Build"
          body: "This release contains the latest build of the Server Monitor."
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
