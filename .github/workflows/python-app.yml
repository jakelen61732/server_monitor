name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0.1
    branches:
      - "main" # Also triggers on main for testing

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      exe_path: dist/Server Monitor.exe
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller gevent-websocket
    - name: Build EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --noconsole `
          --name="Server-Monitor" `
          --icon="favicon-64x64.ico" `
          --add-data "favicon.ico;." `
          --add-data "static;static" `
          --version-file="file_version_info.txt" `
          --hidden-import=gevent `
          --hidden-import=engineio.async_drivers.gevent `
          --hidden-import=geventwebsocket.gws `
          "server_monitor.py"
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-Build
        path: dist/Server-Monitor.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller gevent-websocket
    - name: Build Linux Binary
      run: |
        pyinstaller --noconfirm --onefile --name="server-monitor" \
          --add-data "favicon.ico:." \
          --add-data "static:static" \
          --hidden-import=gevent \
          --hidden-import=engineio.async_drivers.gevent \
          --hidden-import=geventwebsocket.gws \
          "server_monitor.py"
    - name: Create .deb Package
      run: |
        mkdir -p package/usr/local/bin
        cp dist/server-monitor package/usr/local/bin/
        mkdir -p package/DEBIAN
        echo "Package: server-monitor
        Version: 1.0.0
        Architecture: amd64
        Maintainer: github-actions
        Description: Server Monitor Website" > package/DEBIAN/control
        dpkg-deb --build package server-monitor.deb
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Linux-Build
        path: server-monitor.deb

  publish-release:
    permissions: write-all
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    # Only run this if we push a tag or manually want a release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: Windows-Build

      - name: Download Linux Build
        uses: actions/download-artifact@v4
        with:
          name: Linux-Build

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Server-Monitor.exe
            server-monitor.deb
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
