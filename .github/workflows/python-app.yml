name: Build and Release
on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            cmd: powershell ./scripts/build-win.ps1
            artifact_path: dist/Server-Monitor.exe
          - os: ubuntu-latest
            cmd: bash ./scripts/build-linux.sh
            artifact_path: Server-Monitor.deb
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - uses: crazy-max/ghaction-upx@v4
        with:
          version: "v5.1.1"
          install-only: true
      - name: Install Deps
        run: pip install -r requirements.txt pyinstaller gevent-websocket
      - name: Run Build Script
        run: ${{ matrix.cmd }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}-build
          path: ${{ matrix.artifact_path }}

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v8 # Confirmed v8
        with:
          path: ./artifacts

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./artifacts/*/*"
          tag: "latest"
          name: "Latest Continuous Build"
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}